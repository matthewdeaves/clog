name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get install -y build-essential cmake
      - name: Build
        run: mkdir build && cd build && cmake .. && make
      - name: Test
        run: cd build && ctest --output-on-failure
