name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-posix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Build
        run: mkdir build && cd build && cmake .. && make

      - name: Test
        run: cd build && ctest --output-on-failure

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --error-exitcode=1 \
            --enable=warning,performance \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I include \
            src/

  # Cross-compilation jobs - may fail if container lacks MPW Interfaces
  # These verify the code compiles for Classic Mac targets when headers are available
  build-68k:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: ghcr.io/matthewdeaves/retro68@sha256:11bc3005f2cd602ad311ab98d91e3999239648d89b1f6413810eafe93a2a145c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build for 68k
        run: |
          mkdir build-68k && cd build-68k
          cmake .. -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/m68k-apple-macos/cmake/retro68.toolchain.cmake
          make

  build-ppc:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: ghcr.io/matthewdeaves/retro68@sha256:11bc3005f2cd602ad311ab98d91e3999239648d89b1f6413810eafe93a2a145c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build for PPC
        run: |
          mkdir build-ppc && cd build-ppc
          cmake .. -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/powerpc-apple-macos/cmake/retroppc.toolchain.cmake
          make
