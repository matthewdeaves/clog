name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get install -y build-essential cmake
      - name: Build
        run: mkdir build && cd build && cmake .. && make
      - name: Package
        run: tar czf libclog-posix.tar.gz -C build libclog.a -C ../include clog.h
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: libclog-posix.tar.gz
